name: Prime Video NL Pipeline

on:
  schedule:
    # Every day at 05:00 UTC = 07:00 CEST (Amsterdam summer)
    - cron: '0 5 * * *'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '!site/data/**'   # Don't re-trigger on DB persist commits
  workflow_dispatch:  # Manual trigger

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false    # Let running jobs finish; queue the next

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect from TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python main.py collect

      - name: Export JSON for site
        run: python main.py export

      - name: Check day of week
        id: dow
        run: echo "day=$(date +%u)" >> $GITHUB_OUTPUT

      - name: Send email digest (Monday only)
        if: steps.dow.outputs.day == '1' || github.event_name == 'workflow_dispatch'
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python main.py digest

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Persist DB
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Save freshly-collected data files to a temp location
          cp -r data/   /tmp/_persist_data
          cp -r site/data/ /tmp/_persist_site_data

          # Fast-forward to whatever remote main looks like now
          git fetch origin main
          git reset --hard origin/main

          # Restore our collected data on top of the latest remote
          cp -r /tmp/_persist_data/*      data/
          cp -r /tmp/_persist_site_data/* site/data/

          git add data/ site/data/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-update DB: $(date +%F) [skip ci]"

          for i in 1 2 3; do
            git push origin main && exit 0
            echo "Push attempt $i failed, retrying in 5s..."
            git fetch origin main && git reset --hard origin/main
            cp -r /tmp/_persist_data/*      data/
            cp -r /tmp/_persist_site_data/* site/data/
            git add data/ site/data/
            git diff --cached --quiet && echo "Nothing to commit" && exit 0
            git commit -m "Auto-update DB: $(date +%F) [skip ci]"
            sleep 5
          done
          echo "All push attempts failed" && exit 1

